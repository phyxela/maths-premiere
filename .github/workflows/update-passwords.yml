name: Auto-update passwords.json

# Ce déclencheur écoute le "bip" envoyé par Google Apps Script
on:
  repository_dispatch:
    types: [update-passwords]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Donne le droit au robot d'écrire sur le dépôt

    steps:
      - name: Récupérer le code du site
        uses: actions/checkout@v3

      - name: Télécharger les nouveaux accès depuis Google Apps Script
        run: |
          # ⚠️ REMPLACE L'URL CI-DESSOUS PAR L'URL "EXEC" DE TON GOOGLE APPS SCRIPT ⚠️
          curl -L "https://script.google.com/macros/s/AKfycbxOjJhuqlOlWyoplhXGxuP0_77pCUFbpWdkHIdMbXsThJGwmycSs3zadDSERth3LPw/exec?action=get_passwords" -o passwords.json

      - name: Sauvegarder (Commit & Push)
        run: |
          git config user.name "MathsPremiere Bot"
          git config user.email "bot@mathspremiere.com"
          git add passwords.json
          # S'il n'y a pas de changement, on arrête sans faire d'erreur
          git commit -m "🤖 Mise à jour auto des accès élèves" || exit 0
          git push
