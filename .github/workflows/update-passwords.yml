name: Auto-update Passwords JSON

# Ce workflow se déclenche quand Google Apps Script envoie un signal "repository_dispatch"
on:
  repository_dispatch:
    types: [update-passwords]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Télécharger les nouveaux mots de passe depuis Google Apps Script
        run: |
          # Remplace TON_URL_DE_DEPLOIEMENT par l'URL de ton Google Apps Script
          curl -L "https://script.google.com/macros/s/AKfycbxOjJhuqlOlWyoplhXGxuP0_77pCUFbpWdkHIdMbXsThJGwmycSs3zadDSERth3LPw/exec?action=get_passwords" -o passwords.json

      - name: Commit et Push (si changement détecté)
        run: |
          git config user.name "MathsPremiere Bot"
          git config user.email "bot@mathspremiere.com"
          git add passwords.json
          # Si aucune modification n'a été faite, le script s'arrête sans erreur
          git commit -m "🤖 Mise à jour automatique de passwords.json" || exit 0
          git push
