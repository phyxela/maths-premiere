<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsPremière – Administration</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
    rel="stylesheet">
  <style>
    /* =============================================
       DESIGN SYSTEM – Academic Blue & Black
       ============================================= */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap');

    :root {
      --bg: #080c18;
      --bg-mid: #0f1726;
      --bg-lt: #182540;
      --blue: #3b82f6;
      --blue-lt: #60a5fa;
      --blue-xlt: #93c5fd;
      --text: #dde6ff;
      --text-dim: #7088c5;
      --green: #34d399;
      --red: #f87171;
      --orange: #fb923c;
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --border: rgba(59, 130, 246, 0.18);
      --border-dim: rgba(59, 130, 246, 0.09);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
      padding: 0 0 60px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(59, 130, 246, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(99, 102, 241, 0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      margin: 20px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 44px 40px;
      text-align: center;
      box-shadow: var(--shadow), 0 0 0 1px rgba(59, 130, 246, 0.05);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #080c18;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: #e8eeff;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    h1 span {
      color: var(--blue-lt);
    }

    .sub {
      color: var(--text-dim);
      font-size: 13px;
      font-style: italic;
      margin-bottom: 28px;
    }

    input[type="password"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--r-sm);
      padding: 11px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus {
      border-color: var(--blue);
      background: rgba(59, 130, 246, 0.05);
    }

    .btn {
      display: inline-block;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      border-radius: 40px;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #080c18;
      padding: 12px 28px;
      font-size: 14px;
      width: 100%;
      box-shadow: 0 4px 18px rgba(59, 130, 246, 0.3);
    }

    .btn-gold:hover {
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.45);
    }

    .btn-red {
      background: var(--red);
      color: #fff;
      padding: 6px 14px;
      font-size: 12px;
    }

    .btn-dim {
      background: var(--bg-lt);
      color: var(--text-dim);
      padding: 6px 14px;
      font-size: 12px;
      border: 1px solid var(--border-dim);
    }

    .btn-green {
      background: linear-gradient(135deg, var(--green), #10b981);
      color: #fff;
      padding: 6px 14px;
      font-size: 12px;
    }

    .err {
      color: var(--red);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard {
      display: none;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border-dim);
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dash-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #e8eeff;
    }

    .dash-title span {
      color: var(--blue-lt);
    }

    .user-card {
      background: var(--bg-mid);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-md);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s;
    }

    .user-card:hover {
      border-color: var(--border);
    }

    .user-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border-dim);
    }

    .user-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #e8eeff;
    }

    .user-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .limit-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }

    .limit-wrap input[type="number"] {
      width: 62px;
      margin: 0;
      padding: 5px 8px;
      font-size: 13px;
      border-radius: var(--r-sm);
    }

    .slot-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .slot-ok {
      background: rgba(52, 211, 153, 0.12);
      color: var(--green);
      border: 1px solid rgba(52, 211, 153, 0.28);
    }

    .slot-warn {
      background: rgba(251, 146, 60, 0.12);
      color: var(--orange);
      border: 1px solid rgba(251, 146, 60, 0.28);
    }

    .slot-full {
      background: rgba(248, 113, 113, 0.12);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.28);
    }

    .devices-list {
      padding: 10px 24px 16px;
    }

    .device-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(59, 130, 246, 0.06);
    }

    .device-row:last-child {
      border-bottom: none;
    }

    .device-info {
      font-size: 13px;
    }

    .device-browser {
      color: #e8eeff;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .device-detail {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .device-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .no-devices {
      padding: 16px 24px;
      font-style: italic;
      color: var(--text-dim);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: var(--bg-mid);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 12px 20px;
      border-radius: var(--r-sm);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.err {
      border-color: rgba(248, 113, 113, 0.35);
      color: var(--red);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ── Onglets ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-dim);
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
      border-radius: var(--r-sm) var(--r-sm) 0 0;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(59, 130, 246, 0.04);
    }

    .tab-btn.active {
      color: var(--blue-lt);
      border-bottom-color: var(--blue-lt);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* ── Gestion mots de passe ── */
    .pwd-card {
      background: var(--bg-mid);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-md);
      padding: 18px 24px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .pwd-card:hover {
      border-color: var(--border);
    }

    .pwd-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: #e8eeff;
      min-width: 100px;
    }

    .pwd-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .pwd-input {
      background: rgba(59, 130, 246, 0.04);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 14px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      width: 190px;
      transition: border-color 0.2s, background 0.2s;
    }

    .pwd-input:focus {
      border-color: var(--blue);
      background: rgba(59, 130, 246, 0.08);
    }

    .nopassword-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-dim);
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s;
      user-select: none;
    }

    .nopassword-toggle:hover {
      border-color: rgba(251, 146, 60, 0.35);
      color: var(--orange);
    }

    .nopassword-toggle.active {
      background: rgba(251, 146, 60, 0.1);
      border-color: rgba(251, 146, 60, 0.4);
      color: var(--orange);
    }

    .pwd-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .pwd-status.has-pwd {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.28);
      color: var(--green);
    }

    .pwd-status.no-pwd {
      background: rgba(251, 146, 60, 0.1);
      border: 1px solid rgba(251, 146, 60, 0.28);
      color: var(--orange);
    }

    .pwd-status.no-config {
      background: rgba(107, 126, 181, 0.1);
      border: 1px solid rgba(107, 126, 181, 0.2);
      color: var(--text-dim);
    }

    /* ── Tableau Récapitulatif ── */
    .admin-table-container {
      background: var(--bg-mid);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-md);
      overflow: hidden;
      margin-bottom: 30px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .admin-table th,
    .admin-table td {
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid rgba(59, 130, 246, 0.07);
    }

    .admin-table th {
      background: rgba(59, 130, 246, 0.06);
      color: var(--blue-lt);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .admin-table tr:last-child td {
      border-bottom: none;
    }

    .admin-table tr:hover td {
      background: rgba(59, 130, 246, 0.03);
    }

    .hash-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      word-break: break-all;
      max-width: 300px;
    }

    /* ── Ajout élève ── */
    .add-student-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .add-student-card {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .add-student-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--blue-lt);
      margin-bottom: 16px;
    }

    .add-student-fields {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .add-student-fields input[type="text"],
    .add-student-fields input[type="password"] {
      width: auto;
      flex: 1;
      min-width: 140px;
      margin: 0;
      padding: 9px 14px;
      font-size: 13px;
      border-radius: var(--r-sm);
    }

    .nopassword-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .nopassword-inline input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      margin: 0;
      accent-color: var(--blue);
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(59, 130, 246, 0.2);
      border-top-color: var(--blue-lt);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-lt);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.4);
    }

    /* ── Mini-Dashboard Progression ── */
    .adv-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 280px;
    }

    .adv-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      transition: background 0.2s;
    }

    .adv-card:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .adv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .badge-spe {
      background: var(--blue-lt);
      color: #080c18;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .badge-tc {
      background: var(--orange);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .adv-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }

    .adv-stats {
      display: flex;
      gap: 18px;
      margin-bottom: 12px;
    }

    .adv-stat-item {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .adv-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .adv-lbl {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .adv-chaps {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ch-mini-badge {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: var(--blue-xlt);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .adv-progress-bg {
      height: 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .adv-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .no-data {
      color: var(--text-dim);
      font-style: italic;
      font-size: 12px;
      padding: 8px 0;
    }

    /* =============================================
       SYSTÈME D'ANIMATIONS – PANEL ADMIN
       ============================================= */

    /* ── Page transition overlay ── */
    #page-transition {
      position: fixed;
      inset: 0;
      z-index: 99999;
      pointer-events: none;
      overflow: hidden;
    }

    .pt-panel {
      position: absolute;
      inset: 0;
      background: #080c18;
      transform: translateY(0);
      transition: transform 0.7s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .pt-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .pt-logo-badge {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #080c18;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .pt-logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #e8eeff;
    }

    .pt-logo-title span { color: #60a5fa; }

    .pt-progress-wrap {
      width: 160px;
      height: 2px;
      background: rgba(59,130,246,0.15);
      border-radius: 2px;
      margin: 14px auto 0;
      overflow: hidden;
    }

    .pt-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 2px;
      transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    #page-transition.exit .pt-panel {
      transform: translateY(-100%);
    }

    /* ── Login screen animations ── */
    #login-screen {
      transition: opacity 0.4s ease;
    }
    #login-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .login-box {
      animation: loginBoxIn 0.55s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes loginBoxIn {
      from { opacity:0; transform: scale(0.93) translateY(20px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    /* ── Dashboard reveal ── */
    #dashboard {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    #dashboard.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .dash-header {
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.45s ease 0.05s, transform 0.45s ease 0.05s;
    }
    #dashboard.revealed .dash-header {
      opacity: 1;
      transform: translateY(0);
    }

    .tabs {
      opacity: 0;
      transition: opacity 0.4s ease 0.15s;
    }
    #dashboard.revealed .tabs {
      opacity: 1;
    }

    /* ── Tab panel transitions ── */
    .tab-panel {
      animation: none;
    }
    .tab-panel.active {
      animation: tabReveal 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes tabReveal {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Tab button press ── */
    .tab-btn {
      transition: all 0.2s ease, transform 0.12s;
    }
    .tab-btn:active { transform: scale(0.95); }

    /* ── Btn interactions ── */
    .btn {
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.2);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      transition: width 0.5s ease, height 0.5s ease, opacity 0.5s ease;
      opacity: 0;
      pointer-events: none;
    }
    .btn.rippling::after {
      width: 300px; height: 300px;
      opacity: 0;
    }
    .btn:active { transform: scale(0.96) translateY(0) !important; }

    /* ── Student / device cards ── */
    .student-card {
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .student-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }

    .adv-card {
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .adv-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    /* ── Input focus glow ── */
    input[type="password"],
    input[type="text"],
    input[type="number"] {
      transition: border-color 0.2s, background 0.2s, box-shadow 0.25s !important;
    }
    input:focus {
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
    }

    /* ── Progress bar animated ── */
    .adv-progress-fill {
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1) !important;
    }

    /* ── Logout transition ── */
    .logout-exit #dashboard {
      opacity: 0;
      transform: translateY(12px);
    }

  </style>
</head>

<body>

  <!-- ── Transition de page ── -->
  <div id="page-transition">
    <div class="pt-panel">
      <div class="pt-logo">
        <div class="pt-logo-badge">⚙️ Administration</div>
        <div class="pt-logo-title">Maths<span>Première</span></div>
        <div class="pt-progress-wrap"><div class="pt-progress-bar" id="pt-bar"></div></div>
      </div>
    </div>
  </div>

  <div id="login-screen">
    <div class="login-box">
      <div class="badge">⚙️ Administration</div>
      <h1>Maths<span>Première</span></h1>
      <p class="sub">Accès réservé à l'administrateur</p>
      <input type="password" id="admin-pwd" placeholder="Mot de passe admin…"
        onkeydown="if(event.key==='Enter') login()">
      <button id="admin-login-btn" class="btn btn-gold" onclick="login()">Connexion →</button>
      <div class="err" id="login-err">❌ Mot de passe incorrect</div>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="dash-header">
      <div>
        <div class="badge">⚙️ Administration</div>
        <div class="dash-title">Maths<span>Première</span> – Gestion</div>
      </div>
      <button class="btn btn-dim" onclick="logout()">Déconnexion</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('appareils')">🖥️ Appareils</button>
      <button class="tab-btn" onclick="switchTab('passwords')">🔑 Gestion Accès</button>
      <button class="tab-btn" onclick="switchTab('recap')">📋 Récapitulatif</button>
    </div>

    <div id="tab-appareils" class="tab-panel active">
      <div id="dash-content">
        <div class="loading"><span class="spinner"></span>Chargement…</div>
      </div>
    </div>

    <div id="tab-passwords" class="tab-panel">
      <div class="add-student-card">
        <h3>➕ Ajouter un élève</h3>
        <div class="add-student-fields">
          <input type="text" id="new-student-name" placeholder="Prénom…" autocomplete="off"
            onkeydown="if(event.key==='Enter') addStudent()">
          <input type="password" id="new-student-pwd" placeholder="Mot de passe…" autocomplete="off"
            onkeydown="if(event.key==='Enter') addStudent()">
          <label class="nopassword-inline">
            <input type="checkbox" id="new-student-nopwd" onchange="document.getElementById('new-student-pwd').disabled=this.checked;
                        document.getElementById('new-student-pwd').style.opacity=this.checked?'0.3':'1';">
            Sans mot de passe
          </label>
          <button class="btn btn-green" onclick="addStudent()">Ajouter</button>
        </div>
      </div>
      <div id="pwd-content">
        <div class="loading"><span class="spinner"></span>Chargement…</div>
      </div>
    </div>

    <div id="tab-recap" class="tab-panel">
      <!-- Filtres filière -->
      <div style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; align-items:center;">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;">Filtrer :</span>
        <button class="tab-btn active" id="filter-all"   onclick="filterRecap('all')"   style="font-size:11px;padding:7px 16px;">Toutes les filières</button>
        <button class="tab-btn"        id="filter-spe"   onclick="filterRecap('spe')"   style="font-size:11px;padding:7px 16px;">📐 Spécialité</button>
        <button class="tab-btn"        id="filter-tc"    onclick="filterRecap('tc')"    style="font-size:11px;padding:7px 16px;">📊 Tronc Commun</button>
        <button class="tab-btn"        id="filter-none"  onclick="filterRecap('none')"  style="font-size:11px;padding:7px 16px;">⚠️ Aucune activité</button>
      </div>
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>👤 Élève</th>
              <th>🔑 Empreinte (Hash SHA-256)</th>
              <th>🔓 Statut</th>
              <th>📊 Progression</th>
            </tr>
          </thead>
          <tbody id="recap-content-body">
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Configuration ────────────────────────────────────────────────────────
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOjJhuqlOlWyoplhXGxuP0_77pCUFbpWdkHIdMbXsThJGwmycSs3zadDSERth3LPw/exec';

    let adminToken = null;

    // ── Login ─────────────────────────────────────────────────────────────────
    async function login() {
      const pwd = document.getElementById('admin-pwd').value.trim();
      const errEl = document.getElementById('login-err');
      const btn = document.getElementById('admin-login-btn');

      if (!pwd) {
        errEl.textContent = "❌ Saisis un mot de passe.";
        errEl.style.display = 'block';
        return;
      }

      const originalText = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span> Connexion...';
      btn.disabled = true;
      errEl.style.display = 'none';

      adminToken = pwd;

      try {
        const url = SCRIPT_URL + '?action=admin_data&token=' + encodeURIComponent(adminToken);
        const data = await fetch(url).then(r => r.json());

        if (data.error) {
          errEl.textContent = "❌ " + data.error;
          errEl.style.display = 'block';
          adminToken = null;
          btn.innerHTML = originalText;
          btn.disabled = false;
          return;
        }

        document.getElementById('login-screen').classList.add('fade-out');
        btn.innerHTML = originalText;
        btn.disabled = false;
        const pt = document.getElementById('page-transition');
        const ptLogo = pt.querySelector('.pt-logo');
        const ptBar = document.getElementById('pt-bar');
        ptLogo.style.opacity = '1';
        setTimeout(() => { ptBar.style.width = '100%'; }, 60);

        setTimeout(() => {
          document.getElementById('login-screen').style.display = 'none';
          const dash = document.getElementById('dashboard');
          dash.style.display = 'block';

          renderDevices(data);
          renderPasswords(data);
          renderRecap(data);

          // Sortie du panneau + révélation
          setTimeout(() => {
            pt.classList.add('exit');
            setTimeout(() => {
              dash.classList.add('revealed');
            }, 100);
          }, 300);
        }, 650);

      } catch (e) {
        errEl.textContent = "❌ Le serveur Google refuse la connexion.";
        errEl.style.display = 'block';
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    function logout() {
      adminToken = null;
      const dash = document.getElementById('dashboard');
      const ls = document.getElementById('login-screen');
      dash.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      dash.style.opacity = '0';
      dash.style.transform = 'translateY(12px)';
      setTimeout(() => {
        dash.style.display = 'none';
        dash.classList.remove('revealed');
        dash.style.opacity = '';
        dash.style.transform = '';
        dash.style.transition = '';
        ls.style.display = 'flex';
        ls.classList.remove('fade-out');
        ls.style.opacity = '0';
        setTimeout(() => { ls.style.transition = 'opacity 0.35s'; ls.style.opacity = '1'; }, 20);
        setTimeout(() => { ls.style.transition = ''; }, 400);
      }, 350);
      document.getElementById('admin-pwd').value = '';
      // Réinitialiser la barre de transition
      const pt = document.getElementById('page-transition');
      pt.classList.remove('exit');
      document.getElementById('pt-bar').style.width = '0';
      pt.querySelector('.pt-logo').style.opacity = '0';
    }

    // ── Onglets ───────────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.remove('active');
      });

      const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(name));
      if (btn) btn.classList.add('active');

      const panel = document.getElementById('tab-' + name);
      if (panel) {
        panel.classList.add('active');
      }
    }

    // ── Chargement des données ────────────────────────────────────────────────
    async function loadData() {
      const loaders = ['dash-content', 'pwd-content'];
      loaders.forEach(id => {
        document.getElementById(id).innerHTML = '<div class="loading"><span class="spinner"></span>Chargement…</div>';
      });

      try {
        const url = SCRIPT_URL + '?action=admin_data&token=' + encodeURIComponent(adminToken);
        const data = await fetch(url).then(r => r.json());
        if (data.error) throw new Error(data.error);

        renderDevices(data);
        renderPasswords(data);
        renderRecap(data);
      } catch (e) {
        const errHtml = `<div class="loading" style="color:var(--red)">❌ Erreur : ${e.message}</div>`;
        document.getElementById('dash-content').innerHTML = errHtml;
        document.getElementById('pwd-content').innerHTML = errHtml;
      }
    }

    // ── Onglet Appareils ──────────────────────────────────────────────────────
    function renderDevices(data) {
      const userMap = {};
      for (const d of data.devices) {
        if (!userMap[d.name]) userMap[d.name] = [];
        userMap[d.name].push(d);
      }
      for (const name of Object.keys(data.config)) {
        if (!userMap[name]) userMap[name] = [];
      }
      for (const name of Object.keys(data.passwords || {})) {
        if (!userMap[name]) userMap[name] = [];
      }

      const names = Object.keys(userMap).sort();
      if (names.length === 0) {
        document.getElementById('dash-content').innerHTML = '<div class="loading">Aucun élève enregistré.</div>';
        return;
      }

      let html = '';
      for (const name of names) {
        const devices = userMap[name];
        const limit = data.config[name] || data.defaultLimit;
        const count = devices.length;
        const slotClass = count >= limit ? 'slot-full' : count >= limit - 1 ? 'slot-warn' : 'slot-ok';

        html += `
        <div class="user-card" id="card-${safeName(name)}">
          <div class="user-card-header">
            <div class="user-name">👤 ${esc(name)}</div>
            <div class="user-meta">
              <div class="limit-wrap">
                Limite :
                <input type="number" min="1" max="10" value="${limit}" id="limit-${safeName(name)}">
                <button class="btn btn-green" onclick="setLimit('${esc(name)}')">Appliquer</button>
              </div>
              <span class="slot-badge ${slotClass}">${count} / ${limit} appareils</span>
              ${count > 0 ? `<button class="btn btn-red" onclick="deleteAll('${esc(name)}')">Tout supprimer</button>` : ''}
            </div>
          </div>`;

        if (devices.length === 0) {
          html += `<div class="no-devices">Aucun appareil enregistré.</div>`;
        } else {
          html += `<div class="devices-list">`;
          for (const d of devices) {
            html += `
            <div class="device-row" id="dev-${safeName(name)}-${d.fp.slice(0, 8)}">
              <div class="device-info">
                <div class="device-browser">🖥️ ${esc(d.browser || '—')} · ${esc(d.os || '—')}</div>
                <div class="device-detail">Écran : ${esc(d.screen || '—')}</div>
                <div class="device-date">Enregistré le ${esc(d.date || '—')}</div>
              </div>
              <button class="btn btn-red" onclick="deleteDevice('${esc(name)}','${d.fp}')">Supprimer</button>
            </div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }
      document.getElementById('dash-content').innerHTML = html;
    }

    // ── Onglet Mots de passe ──────────────────────────────────────────────────
    function renderPasswords(data) {
      const allNames = new Set([
        ...data.devices.map(d => d.name),
        ...Object.keys(data.config),
        ...Object.keys(data.passwords || {})
      ]);

      if (allNames.size === 0) {
        document.getElementById('pwd-content').innerHTML = '<div class="loading">Aucun élève. Utilisez le formulaire.</div>';
        return;
      }

      const passwords = data.passwords || {};
      let html = '';

      for (const name of [...allNames].sort()) {
        const pwd = passwords[name];
        const hasHash = pwd && pwd.hash;
        const noPassword = pwd && pwd.noPassword;

        let statusHtml = noPassword
          ? `<span class="pwd-status no-pwd">🔓 Sans mot de passe</span>`
          : (hasHash ? `<span class="pwd-status has-pwd">🔒 Mot de passe défini</span>` : `<span class="pwd-status no-config">⚠️ Non configuré</span>`);

        html += `
        <div class="pwd-card" id="pwd-card-${safeName(name)}">
          <div class="pwd-name">👤 ${esc(name)}</div>
          ${statusHtml}
          <div class="pwd-controls">
            <input class="pwd-input" type="password" id="pwd-input-${safeName(name)}"
                   placeholder="Nouveau mot de passe…" ${noPassword ? 'disabled style="opacity:0.3"' : ''}>
            <button class="btn btn-green" onclick="setPassword('${esc(name)}')" ${noPassword ? 'disabled style="opacity:0.3"' : ''}>Appliquer</button>
            <label class="nopassword-toggle ${noPassword ? 'active' : ''}" onclick="toggleNoPassword('${esc(name)}', ${!noPassword})">
              🔓 Sans mot de passe${noPassword ? ' ✓' : ''}
            </label>
            <button class="btn btn-red" onclick="deleteStudent('${esc(name)}')">🗑️</button>
          </div>
        </div>`;
      }
      document.getElementById('pwd-content').innerHTML = html;
    }

    // ── Onglet Récapitulatif ─────────────────────────────────────────
    let _lastRecapData = null; // garde les données pour le filtre

    function renderRecap(data) {
      _lastRecapData = data;
      filterRecap('all');
    }

    function filterRecap(mode) {
      // Mise à jour des boutons filtre
      ['all','spe','tc','none'].forEach(f => {
        const btn = document.getElementById('filter-' + f);
        if (btn) btn.classList.toggle('active', f === mode);
      });
      _buildRecapTable(_lastRecapData, mode);
    }

    function _buildRecapTable(data, filterMode) {
      if (!data) return;
      const allNames = new Set([
        ...data.devices.map(d => d.name),
        ...Object.keys(data.config),
        ...Object.keys(data.passwords || {})
      ]);

      const passwords   = data.passwords   || {};
      const advancements = data.advancements || {};
      const tbody = document.getElementById('recap-content-body');
      tbody.innerHTML = '';

      // Fonction utilitaire pour générer une belle carte de stats
      const buildAdvCard = (advData, label, badgeClass) => {
        if (!advData || parseInt(advData.total) === 0) return '';
        const total   = parseInt(advData.total)   || 0;
        const correct = parseInt(advData.correct) || 0;
        const streak  = parseInt(advData.bestStreak) || 0;
        const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
        let color = 'var(--red)';
        if (pct >= 70) color = 'var(--green)';
        else if (pct >= 40) color = 'var(--orange)';
        const dateStr = advData.date ? advData.date.split(' ')[0] : '—';
        const chaps = advData.chapitres ? advData.chapitres.split(',').map(c => c.trim()).filter(Boolean) : [];
        const chapHtml = chaps.length > 0
          ? chaps.map(c => `<span class="ch-mini-badge">${c.replace('Ch.', 'Ch ')}</span>`).join('')
          : `<span style="color:var(--text-dim); font-size:10px; font-style:italic;">Aucun</span>`;
        return `
          <div class="adv-card">
            <div class="adv-header">
              <span class="badge ${badgeClass}" style="margin:0;">${label}</span>
              <span class="adv-date" title="Dernière activité">🕒 ${dateStr}</span>
            </div>
            <div class="adv-stats">
              <div class="adv-stat-item">
                <span class="adv-val" style="color:${color}">${pct}%</span>
                <span class="adv-lbl">Réussite</span>
              </div>
              <div class="adv-stat-item">
                <span class="adv-val">${correct} / ${total}</span>
                <span class="adv-lbl">Exercices</span>
              </div>
              <div class="adv-stat-item">
                <span class="adv-val" style="color:var(--orange)">🔥 ${streak}</span>
                <span class="adv-lbl">Série Max</span>
              </div>
            </div>
            <div class="adv-chaps">
              <span class="adv-lbl" style="margin-right:2px;">Chapitres :</span>
              ${chapHtml}
            </div>
            <div class="adv-progress-bg">
              <div class="adv-progress-fill" style="width: ${pct}%; background-color: ${color};"></div>
            </div>
          </div>
        `;
      };

      let shown = 0;
      for (const name of [...allNames].sort()) {
        const pwd = passwords[name];
        const hash = (pwd && pwd.hash) ? pwd.hash : '—';
        const noPassword = pwd && pwd.noPassword;
        const adv = advancements[name] || {};

        const hasSpe  = adv.spe  && parseInt(adv.spe.total)  > 0;
        const hasTc   = adv.tc   && parseInt(adv.tc.total)   > 0;
        const hasAny  = hasSpe || hasTc;

        // Filtrage
        if (filterMode === 'spe'  && !hasSpe)  continue;
        if (filterMode === 'tc'   && !hasTc)   continue;
        if (filterMode === 'none' && hasAny)   continue;

        const speHtml = buildAdvCard(adv.spe, 'Spécialité',   'badge-spe');
        const tcHtml  = buildAdvCard(adv.tc,  'Tronc Commun', 'badge-tc');

        let statsHtml = '<div class="adv-grid">';
        if (speHtml || tcHtml) {
          statsHtml += speHtml + tcHtml;
        } else {
          statsHtml += `<div class="no-data">Aucun exercice réalisé pour le moment.</div>`;
        }
        statsHtml += '</div>';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="font-weight:600; color:var(--text); vertical-align:top;">${esc(name)}</td>
          <td class="hash-cell" style="vertical-align:top;">${noPassword ? '<span style="color:var(--orange)">[ACCÈS LIBRE]</span>' : esc(hash)}</td>
          <td style="vertical-align:top;">${noPassword ? '🔓 Libre' : '🔒 Protégé'}</td>
          <td>${statsHtml}</td>
        `;
        tbody.appendChild(row);
        shown++;
      }

      if (shown === 0) {
        const row = document.createElement('tr');
        row.innerHTML = `<td colspan="4" style="text-align:center;color:var(--text-dim);font-style:italic;padding:24px;">Aucun élève ne correspond à ce filtre.</td>`;
        tbody.appendChild(row);
      }
    }

    // ── Actions API ───────────────────────────────────────────────────────────
    async function apiPost(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ ...payload, token: adminToken })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data;
    }

    async function setLimit(name) {
      const limit = parseInt(document.getElementById('limit-' + safeName(name)).value);
      if (!limit || limit < 1) return;
      try {
        await apiPost({ type: 'admin_set_limit', name, limit });
        toast('✅ Limite mise à jour');
        await loadData();
      } catch (e) { toast('❌ ' + e.message, true); }
    }

    async function deleteDevice(name, fp) {
      if (!confirm(`Supprimer cet appareil pour ${name} ?`)) return;
      const row = document.getElementById(`dev-${safeName(name)}-${fp.slice(0, 8)}`);
      if (row) row.style.display = 'none';
      try {
        await apiPost({ type: 'admin_delete_device', name, fp });
        toast('✅ Appareil supprimé');
      } catch (e) {
        if (row) row.style.display = 'flex';
        toast('❌ ' + e.message, true);
      }
    }

    async function deleteAll(name) {
      if (!confirm(`Supprimer TOUS les appareils de ${name} ?`)) return;
      try {
        await apiPost({ type: 'admin_delete_all_devices', name });
        toast('✅ Appareils réinitialisés');
        await loadData();
      } catch (e) { toast('❌ ' + e.message, true); }
    }

    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function setPassword(name) {
      const input = document.getElementById('pwd-input-' + safeName(name));
      if (!input.value.trim()) { toast('❌ Saisis un mot de passe', true); return; }
      try {
        const hash = await sha256(input.value.trim());
        await apiPost({ type: 'admin_set_password', name, hash });
        input.value = '';
        toast('✅ Mot de passe mis à jour');
        await loadData();
      } catch (e) { toast('❌ ' + e.message, true); }
    }

    async function toggleNoPassword(name, noPassword) {
      try {
        await apiPost({ type: 'admin_toggle_nopassword', name, noPassword });
        toast(noPassword ? '🔓 Accès libre activé' : '🔒 Mot de passe requis');
        await loadData();
      } catch (e) { toast('❌ ' + e.message, true); }
    }

    async function addStudent() {
      const name = document.getElementById('new-student-name').value.trim();
      const pwd = document.getElementById('new-student-pwd').value.trim();
      const noPassword = document.getElementById('new-student-nopwd').checked;

      if (!name) { toast('❌ Saisis un prénom.', true); return; }
      if (!noPassword && !pwd) { toast('❌ Saisis un mot de passe.', true); return; }

      try {
        const hash = noPassword ? '' : await sha256(pwd);
        await apiPost({ type: 'admin_add_student', name, hash, noPassword });
        document.getElementById('new-student-name').value = '';
        document.getElementById('new-student-pwd').value = '';
        toast('✅ Élève ' + name + ' ajouté !');
        await loadData();
      } catch (e) {
        toast(e.message === 'exists' ? '⚠️ Existe déjà' : '❌ ' + e.message, true);
      }
    }

    async function deleteStudent(name) {
      if (!confirm(`⚠️ Supprimer DÉFINITIVEMENT l'élève ${name} ?`)) return;
      try {
        await apiPost({ type: 'admin_delete_student', name });
        toast('✅ Élève supprimé');
        await loadData();
      } catch (e) { toast('❌ ' + e.message, true); }
    }

    // ── Utilitaires ───────────────────────────────────────────────────────────
    function safeName(name) { return name.toLowerCase().replace(/[^a-z0-9]/g, '_'); }
    function esc(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    let _toastTimer = null;
    function toast(msg, isErr = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast' + (isErr ? ' err' : '');
      void el.offsetWidth;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
    }
  </script>

  <!-- ── Animations globales admin ─────────────────────────── -->
  <script>
    // Ripple sur tous les .btn
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      btn.classList.remove('rippling');
      void btn.offsetWidth;
      btn.classList.add('rippling');
      setTimeout(() => btn.classList.remove('rippling'), 600);
    });

    // Stagger sur les cartes au chargement d'un onglet
    function staggerCards(selector, delay = 45) {
      document.querySelectorAll(selector).forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(10px)';
        card.style.transition = `opacity 0.35s ease ${i * delay}ms, transform 0.35s ease ${i * delay}ms`;
        requestAnimationFrame(() => {
          setTimeout(() => {
            card.style.opacity = '';
            card.style.transform = '';
            setTimeout(() => { card.style.transition = ''; }, 350 + i * delay);
          }, 20);
        });
      });
    }

    // Observer les changements de contenu dans les onglets
    const _staggerObs = new MutationObserver(() => {
      staggerCards('.student-card', 40);
      staggerCards('.adv-card', 35);
    });
    ['dash-content','pwd-content','recap-content-body'].forEach(id => {
      const el = document.getElementById(id);
      if (el) _staggerObs.observe(el, { childList: true });
    });

    // Progress bars animées après injection DOM
    function animateProgressBars() {
      document.querySelectorAll('.adv-progress-fill').forEach(bar => {
        const w = bar.style.width;
        bar.style.width = '0';
        requestAnimationFrame(() => {
          setTimeout(() => { bar.style.width = w; }, 30);
        });
      });
    }
    const _progressObs = new MutationObserver(animateProgressBars);
    const _tabRecap = document.getElementById('tab-recap');
    if (_tabRecap) _progressObs.observe(_tabRecap, { subtree: true, childList: true });
  </script>
</body>
